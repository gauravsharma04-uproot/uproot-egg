
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ settings.business_name }} Egg Experience</title>
  <style>
    :root{
      --bg:#110e09;--panel:#1a150e;--panel2:#201a12;--gold:#d4af37;--gold2:#f2d47a;
      --text:#f7f2e6;--muted:#cabf9d;--line:rgba(212,175,55,.22);--ok:#9ae39a;--warn:#ffca80;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:
    radial-gradient(circle at top, rgba(212,175,55,.12), transparent 35%), linear-gradient(180deg,#161108 0%,var(--bg) 100%);
    color:var(--text)}
    a{color:inherit}
    .wrap{max-width:460px;margin:0 auto;min-height:100vh;padding:20px 16px 40px}
    .card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:24px;padding:22px 18px;box-shadow:0 10px 30px rgba(0,0,0,.35);backdrop-filter:blur(8px)}
    .brand{text-transform:uppercase;letter-spacing:.18em;color:var(--gold2);font-size:11px;text-align:center;margin-bottom:8px}
    h1,h2,h3{font-family:Georgia,"Times New Roman",serif;line-height:1.06;margin:8px 0 12px;text-align:center}
    h1{font-size:40px} h2{font-size:32px} h3{font-size:22px}
    .sub{color:var(--muted);font-size:15px;line-height:1.5;text-align:center;max-width:320px;margin:0 auto 16px}
    .btn{width:100%;display:inline-block;text-align:center;text-decoration:none;border:0;border-radius:16px;padding:15px 18px;background:linear-gradient(180deg,#f0d273 0%,#c3901d 100%);color:#2e2207;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 8px 24px rgba(212,175,55,.22)}
    .btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12);box-shadow:none}
    .field{margin:12px 0} label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px}
    input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--text);font-size:15px}
    table input{padding:10px;font-size:13px}
    .checks{display:grid;gap:10px;margin:18px 0}.check{display:flex;gap:10px;align-items:center}.bubble{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.25);color:var(--gold2);flex:0 0 24px}
    .flash{margin-bottom:12px;background:rgba(255,255,255,.06);border:1px solid var(--line);padding:12px 14px;border-radius:14px;color:var(--warn)}
    .grid{display:grid;gap:16px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center}.num{font-size:28px;font-weight:800;color:var(--gold2)}
    .topnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .admin-grid{display:grid;gap:16px}
    table{width:100%;border-collapse:collapse;font-size:13px} th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(212,175,55,.08);font-size:12px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    .small{font-size:12px;color:var(--muted);line-height:1.45}
    @media(min-width:900px){ .wrap{max-width:1100px}.admin-grid{grid-template-columns:380px 1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </div>
</body>
</html>
